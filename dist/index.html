<script type="text/babel">

// ── SettingsSidebar ─────────────────────────────────────────────

  const toggle = (type) => {
    const cur = settings.questionTypes;
    setSettings({ ...settings, questionTypes: cur.includes(type) ? cur.filter(t=>t!==type) : [...cur, type] });
  };
  const handleSubjectChange = (e) => {
    setSettings({ ...settings, subject: e.target.value, questionTypes: [] });
  };

  return (
    <>
      <div className="card">
        <div className="card-header">
          <svg className="icon" width="16" height="16" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6M16 13H8M16 17H8M10 9H8"/></svg>

        </div>
        <div className="card-body">
          <div>
            <label className="form-label">適用對象</label>

              {GRADES.map(g=><option key={g} value={g}>{g}</option>)}

          </div>
          <div>
            <label className="form-label">課綱學習階段</label>

              {STAGES.map(s=><option key={s} value={s}>{s}</option>)}
            </select>
          </div>
          <div>
            <label className="form-label">科目領域</label>
            <select className="form-select" value={settings.subject} onChange={handleSubjectChange}>
              {SUBJECTS.map(s=><option key={s.id} value={s.id}>{s.label}</option>)}
            </select>
          </div>
          <div>
            <label className="form-label">布魯姆認知程度</label>

// ── UploadArea ──────────────────────────────────────────────────
function UploadArea({ status, setStatus, fileName, setFileName }) {
  const [drag, setDrag] = useState(false);
  const inputRef = useRef();

  const handleFiles = (files) => {
    if (!files || files.length === 0) return;
    const f = files[0];
    setFileName(f.name);
    setStatus('analyzing');
    setTimeout(() => setStatus('success'), 3000);
  };

  if (status === 'analyzing') return (
    <div className="analyzing-card">
      <div className="spinner"></div>
      <div style={{fontWeight:700,fontSize:'1.05rem',color:'var(--slate-800)',marginBottom:8}}>AI 正在深度解析教材內容...</div>
      <div style={{fontSize:'0.875rem',color:'var(--slate-500)'}}>正在識別108課綱學習重點與素養指標，請稍候</div>
      <div className="pulse-bar-wrap"><div className="pulse-bar"><div className="pulse-bar-inner"></div></div></div>
    </div>
  );

  if (status === 'success') return (
    <div className="success-card">
      <div className="success-icon-wrap">
        <svg className="icon" width="24" height="24" viewBox="0 0 24 24" style={{stroke:'var(--emerald-600)'}}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
      </div>
      <div style={{fontWeight:700,fontSize:'1rem',color:'var(--emerald-800)',marginBottom:4}}>解析完成！</div>
      <div style={{fontSize:'0.875rem',color:'var(--emerald-600)',marginBottom:12}}>📄 {fileName}</div>
      <button className="btn btn-secondary" style={{fontSize:'0.78rem',padding:'6px 16px'}} onClick={()=>{setStatus('idle');setFileName('');}}>重新上傳</button>
    </div>
  );

  return (
    <div
      className={`upload-zone${drag?' drag-over':''}`}
      onClick={() => inputRef.current.click()}
      onDragOver={e=>{e.preventDefault();setDrag(true);}}
      onDragLeave={()=>setDrag(false)}
      onDrop={e=>{e.preventDefault();setDrag(false);handleFiles(e.dataTransfer.files);}}
    >
      <input ref={inputRef} type="file" style={{display:'none'}} accept=".pdf,.docx,.xlsx,.pptx,.png,.jpg,.jpeg"
        onChange={e=>handleFiles(e.target.files)} />
      <div className="upload-icon">
        <svg className="icon" width="28" height="28" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      </div>
      <div className="upload-title">{drag ? '放開以上傳檔案' : '點擊或拖曳教材檔案至此'}</div>
      <div className="upload-desc">
        上傳後 AI 將自動分析內容，識別 108 課綱學習重點<br/>並依據布魯姆分類法生成對應試題
      </div>
      <div className="file-badges">
        {[['#ef4444','PDF'],['#2563eb','Word'],['#059669','Excel'],['#ea580c','PPT'],['#9333ea','圖片']].map(([c,l])=>(
          <div key={l} className="file-badge"><div className="dot" style={{background:c}}/>{l}</div>
        ))}
      </div>
    </div>
  );
}

// ── ExamPreview ─────────────────────────────────────────────────
function ExamPreview({ settings, layout, status }) {
  if (status !== 'success') return (
    <div className="empty-state" style={{width:'100%'}}>
      <svg className="icon" width="56" height="56" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6M16 13H8M16 17H8M10 9H8"/></svg>
      <p style={{fontSize:'1rem',fontWeight:600}}>請先上傳教材檔案</p>
      <p style={{fontSize:'0.875rem',marginTop:6}}>系統將自動提煉學習重點並在此預覽試卷</p>
    </div>
  );

  const dims = PAPER_DIM[layout.size] || PAPER_DIM.A4;
  const isLandscape = layout.orientation === '橫向';
  const pw = isLandscape ? dims.h : dims.w;
  const ph = isLandscape ? dims.w : dims.h;
  const paperStyle = {
    width: Math.min(pw, 760)+'px',
    minHeight: ph+'px',
    padding: MARGIN_PX[layout.margin] || MARGIN_PX.standard,
    columnCount: layout.columns,
    columnGap: '2rem',
    writingMode: layout.textDir === '直書' ? 'vertical-rl' : 'horizontal-tb',
    background: 'white',
    boxShadow: '0 4px 48px rgba(0,0,0,0.22)',
    fontFamily: "'Noto Sans TC', sans-serif",
  };

  const subjectLabel = {general:'跨領域', chinese:'國語', math:'數學', science:'自然'}[settings.subject] || '';
  const types = settings.questionTypes;
  const bloomLabel = settings.bloom === 'all' ? '（依題型自動分配）' : settings.bloom;

  return (
    <div style={paperStyle}>
      <div style={{columnSpan:'all', textAlign:'center', borderBottom:'2px solid #1e293b', paddingBottom:'16px', marginBottom:'24px'}}>
        <div style={{fontSize:'1.3rem',fontWeight:900,marginBottom:'6px'}}>{settings.grade} {subjectLabel} 素養導向評量卷</div>
        <div style={{fontSize:'0.95rem',color:'var(--slate-600)',marginBottom:'12px'}}>學習階段：{settings.stage}</div>
        <div style={{display:'flex',justifyContent:'space-between',fontSize:'0.82rem',fontWeight:600}}>
          <span>班級：_________ 座號：_____ 姓名：______________</span>
          <span>得分：</span>
        </div>
        <div style={{textAlign:'left',fontSize:'0.75rem',color:'var(--slate-400)',marginTop:'6px'}}>認知目標：{bloomLabel}</div>
      </div>

      {types.length === 0 ? (
        <div style={{textAlign:'center',color:'var(--slate-400)',padding:'40px 0'}}>尚未選擇任何題型</div>
      ) : (
        types.map((type, secIdx) => {
          const qs = MOCK_QS[type] || [{
            q:`（${type}示範題）請根據所學的108課綱相關概念作答。`,
            ans:'（本題答案視實際教材內容而定）',
            bloom:'理解', focus:'課綱核心概念',
          }];
          return (
            <div key={type} style={{marginBottom:'28px', breakInside:'avoid'}}>
              <div style={{fontWeight:700, fontSize:'1rem', marginBottom:'12px', borderLeft:'4px solid var(--blue-500)', paddingLeft:'10px', color:'var(--slate-800)'}}>
                {secIdx+1}. {type}
              </div>
              {qs.map((item, qi) => (
                <div key={qi} className="question-item">
                  <div style={{display:'flex', gap:'8px', marginBottom:'8px', color:'var(--slate-800)'}}>
                    <span style={{fontWeight:700,flexShrink:0}}>({qi+1})</span>
                    <span style={{whiteSpace:'pre-line'}}>{item.q}</span>
                  </div>
                  {item.opts && (
                    <div style={{paddingLeft:'28px', display:'flex', flexDirection:'column', gap:'4px', color:'var(--slate-700)', fontSize:'0.9em', marginBottom:'8px'}}>
                      {item.opts.map(o=><div key={o}>{o}</div>)}
                    </div>
                  )}
                  <div style={{display:'flex', flexWrap:'wrap', gap:'6px', paddingLeft:'28px', opacity:0.85}}>
                    <span style={{display:'inline-flex',alignItems:'center',gap:'4px',fontSize:'0.65rem',fontWeight:600,padding:'2px 8px',borderRadius:'20px',background:'#f3e8ff',color:'#7e22ce',border:'1px solid #e9d5ff'}}>
                      🧠 布魯姆：{item.bloom}
                    </span>
                    <span style={{display:'inline-flex',alignItems:'center',gap:'4px',fontSize:'0.65rem',fontWeight:600,padding:'2px 8px',borderRadius:'20px',background:'#dbeafe',color:'#1d4ed8',border:'1px solid #bfdbfe'}}>
                      🎯 學習重點：{item.focus}
                    </span>
                  </div>
                </div>
              ))}
            </div>
          );
        })
      )}

      <div style={{textAlign:'center', fontSize:'0.72rem', color:'#cbd5e1', marginTop:'40px', borderTop:'1px solid #f1f5f9', paddingTop:'16px'}}>
        — 試卷結束 · 108課綱素養導向評量 —
      </div>
    </div>
  );
}

// ── ExportModal ─────────────────────────────────────────────────
const EXPORT_OPTS = [
  {id:'q',   label:'題目卷（無答案）',      desc:'純題目，適合直接發給學生作答'},
  {id:'qa',  label:'題目卷（含答案）',      desc:'題目下附正確答案，供教師對卷用'},
  {id:'ans', label:'單純答案卷',           desc:'只有答案欄位，配合題目卷使用'},
  {id:'exp', label:'題目卷（含答案及解析）', desc:'包含完整解題思路，適合課後檢討'},
];

function ExportModal({ onClose }) {
  const [sel, setSel] = useState({q:true,qa:false,ans:false,exp:false});
  const [meta, setMeta] = useState(true);
  const [state, setState] = useState('idle');

  const handleExport = () => {
    if (!Object.values(sel).some(Boolean)) return;
    setState('loading');
    setTimeout(()=>setState('done'), 2000);
    setTimeout(onClose, 4000);
  };

  return (
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal-box">
        <div className="modal-header">
          <div className="modal-title">
            <svg className="icon" width="20" height="20" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            匯出試卷（Docx）
          </div>
          <button className="modal-close" onClick={onClose}>
            <svg className="icon" width="18" height="18" viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12"/></svg>
          </button>
        </div>

        {state === 'done' ? (
          <div className="success-animation">
            <div className="success-circle">
              <svg className="icon" width="36" height="36" viewBox="0 0 24 24" style={{stroke:'var(--emerald-600)'}}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
            </div>
            <div style={{fontSize:'1.25rem',fontWeight:700,color:'var(--slate-800)',marginBottom:8}}>匯出成功！</div>
            <div style={{fontSize:'0.875rem',color:'var(--slate-500)'}}>Docx 檔案已產生完成，即將下載...</div>
          </div>
        ) : (
          <>
            <div className="modal-body">
              <div className="modal-section-label">選擇匯出內容</div>
              {EXPORT_OPTS.map(opt=>(
                <div key={opt.id} className={`export-option${sel[opt.id]?' selected':''}`} onClick={()=>setSel({...sel,[opt.id]:!sel[opt.id]})}>
                  <div className="export-option-check"></div>
                  <div>
                    <div className="export-option-label">{opt.label}</div>
                    <div className="export-option-desc">{opt.desc}</div>
                  </div>
                </div>
              ))}
              <label className="meta-toggle">
                <input type="checkbox" checked={meta} onChange={e=>setMeta(e.target.checked)} />
                <span>附上 108 課綱學習重點及布魯姆認知能力程度標籤</span>
              </label>
            </div>
            <div className="modal-footer">
              <button className="btn btn-secondary w-full" onClick={onClose} disabled={state==='loading'}>取消</button>
              <button
                className="btn btn-blue w-full"
                onClick={handleExport}
                disabled={state==='loading' || !Object.values(sel).some(Boolean)}
                style={{flex:2}}
              >
                {state==='loading' ? (
                  <span style={{display:'flex',alignItems:'center',gap:8}}>
                    <span className="spinner" style={{width:18,height:18,borderWidth:2,margin:0}}></span>
                    產生中...
                  </span>
                ) : '生成 Docx 檔案'}
              </button>
            </div>
          </>
        )}
      </div>
    </div>
  );
}

// ── Main App ────────────────────────────────────────────────────
function App() {
  const [uploadStatus, setUploadStatus] = useState('idle');
  const [fileName, setFileName] = useState('');
  const [showExport, setShowExport] = useState(false);
  const [settings, setSettings] = useState({
    grade: '國中一年級',
    stage: '第四學習階段 (國一~國三)',
    subject: 'general',
    bloom: 'all',
    questionTypes: ['選擇題', '問答題'],
  });
  const [layout, setLayout] = useState({
    orientation: '直向',
    size: 'A4',
    margin: 'standard',
    columns: 1,
    textDir: '橫書',
  });

  const marginLabel = { standard:'標準邊界', narrow:'窄邊界', wide:'寬邊界' }[layout.margin];

  return (
    <div className="app">
      {/* Navbar */}
      <nav className="navbar">
        <div className="navbar-inner">
          <div className="brand">
            <div className="brand-icon">
              <svg className="icon" width="22" height="22" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6M16 13H8M16 17H8M10 9H8"/></svg>
            </div>
            <div>
              <div className="brand-title">108課綱 智能題庫生成器</div>
              <div className="brand-subtitle">Taiwan 108 Curriculum Exam Generator</div>
            </div>
          </div>
          {uploadStatus === 'success' && (
            <button className="btn btn-primary" onClick={()=>setShowExport(true)}>
              <svg className="icon" width="16" height="16" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
              匯出試卷
            </button>
          )}
        </div>
      </nav>

      {/* Main */}
      <div className="main-content">
        {/* Sidebar */}
        <div className="sidebar">
          <SettingsSidebar settings={settings} setSettings={setSettings} />
          <LayoutSidebar layout={layout} setLayout={setLayout} />
        </div>

        {/* Content */}
        <div style={{flex:1, display:'flex', flexDirection:'column', gap:'20px', minWidth:0}}>
          <UploadArea status={uploadStatus} setStatus={setUploadStatus} fileName={fileName} setFileName={setFileName} />

          {/* Preview Card */}
          <div className="preview-card">
            <div className="preview-header">
              <div className="preview-header-title">
                <svg className="icon" width="16" height="16" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6M16 13H8M16 17H8M10 9H8"/></svg>
                試卷預覽
              </div>
              <div className="preview-badge">
                {layout.size} · {layout.orientation} · {marginLabel} · {layout.columns}欄 · {layout.textDir}
              </div>
            </div>
            <div className="preview-body">
              <ExamPreview settings={settings} layout={layout} status={uploadStatus} />
            </div>
          </div>
        </div>
      </div>

      {showExport && <ExportModal onClose={()=>setShowExport(false)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
